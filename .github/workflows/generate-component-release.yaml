name: Generate ComponentRelease

on:
  push:
    branches: [main]
    paths:
      - "namespaces/*/components/*/workload.yaml"
  workflow_dispatch:
    inputs:
      namespace:
        description: "OC namespace (e.g. thunderid)"
        required: true
        default: "thunderid"
      project:
        description: "OC project name (e.g. identity-platform)"
        required: true
        default: "identity-platform"
      component:
        description: "Component name (e.g. thunder)"
        required: true
        default: "thunder"

jobs:
  generate-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install occ CLI
        run: |
          curl -L https://nightly.link/openchoreo/openchoreo/workflows/build-and-test/main/occ.zip -o occ.zip
          unzip -p occ.zip linux/amd64/occ > occ
          chmod +x occ
          sudo mv occ /usr/local/bin/occ
          rm -f occ.zip
          occ version

      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Derive namespace and component from changed workload.yaml path
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep 'workload.yaml' | head -1)
            # path: namespaces/<namespace>/components/<component>/workload.yaml
            NAMESPACE=$(echo "$CHANGED" | cut -d'/' -f2)
            COMPONENT=$(echo "$CHANGED" | cut -d'/' -f4)
            PROJECT="identity-platform"
          else
            NAMESPACE="${{ github.event.inputs.namespace }}"
            COMPONENT="${{ github.event.inputs.component }}"
            PROJECT="${{ github.event.inputs.project }}"
          fi
          echo "namespace=$NAMESPACE" >> $GITHUB_OUTPUT
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT

      - name: Configure occ context
        run: |
          mkdir -p ~/.openchoreo
          cat > ~/.openchoreo/config <<EOF
          currentContext: default
          controlplanes:
            - name: default
              url: http://localhost:8080
          credentials:
            - name: default
          contexts:
            - name: default
              controlplane: default
              credentials: default
              namespace: ${{ steps.resolve.outputs.namespace }}
              project: ${{ steps.resolve.outputs.project }}
          EOF

      - name: Generate ComponentRelease
        id: generate
        run: |
          COMPONENT_DIR="namespaces/${{ steps.resolve.outputs.namespace }}/components/${{ steps.resolve.outputs.component }}"

          # Snapshot existing files before generation
          BEFORE=$(ls "$COMPONENT_DIR"/*.yaml | sort)

          cd "$COMPONENT_DIR"
          occ componentrelease generate --all --mode file-system
          cd "$GITHUB_WORKSPACE"

          # Find the newly generated file by comparing before/after
          AFTER=$(ls "$COMPONENT_DIR"/*.yaml | sort)
          NEW_FILE=$(comm -13 <(echo "$BEFORE") <(echo "$AFTER") | head -1)
          NEW_FILENAME=$(basename "$NEW_FILE")

          # Extract release name from the new file's metadata.name
          RELEASE_NAME=$(awk '/^metadata:/{found=1} found && /^  name:/{print $2; exit}' "$NEW_FILE")

          echo "new_file=$NEW_FILENAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "component_dir=$COMPONENT_DIR" >> $GITHUB_OUTPUT
          echo "Generated ComponentRelease: $RELEASE_NAME ($NEW_FILENAME)"

      - name: Update kustomization and ReleaseBinding
        run: |
          COMPONENT_DIR="${{ steps.generate.outputs.component_dir }}"
          RELEASE_NAME="${{ steps.generate.outputs.release_name }}"
          NEW_FILE="${{ steps.generate.outputs.new_file }}"

          # Add new ComponentRelease file to kustomization (keep old ones — staging/prod may still reference them)
          if ! grep -q "$NEW_FILE" "$COMPONENT_DIR/kustomization.yaml"; then
            sed -i "s|  - release-binding.yaml|  - $NEW_FILE\n  - release-binding.yaml|" "$COMPONENT_DIR/kustomization.yaml"
            echo "Added $NEW_FILE to kustomization.yaml"
          else
            echo "$NEW_FILE already in kustomization.yaml, skipping"
          fi

          # Update ReleaseBinding to point to new release
          sed -i "s/^  releaseName:.*/  releaseName: $RELEASE_NAME/" "$COMPONENT_DIR/release-binding.yaml"

          echo "Updated kustomization.yaml: component-release.yaml → $NEW_FILE"
          echo "Updated ReleaseBinding releaseName → $RELEASE_NAME"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/${{ steps.resolve.outputs.namespace }}-${{ steps.resolve.outputs.component }}-${{ steps.generate.outputs.release_name }}
          base: main
          commit-message: "chore(${{ steps.resolve.outputs.component }}): generate ComponentRelease ${{ steps.generate.outputs.release_name }}"
          title: "chore(${{ steps.resolve.outputs.component }}): generate ComponentRelease ${{ steps.generate.outputs.release_name }}"
          body: |
            ## Auto-generated ComponentRelease

            **Namespace:** `${{ steps.resolve.outputs.namespace }}`
            **Component:** `${{ steps.resolve.outputs.component }}`
            **New Release:** `${{ steps.generate.outputs.release_name }}`

            ### Changes
            - Generated `component-release.yaml` from current `workload.yaml`
            - Updated `release-binding.yaml` to point to `${{ steps.generate.outputs.release_name }}`

            ### Review checklist
            - [ ] Verify ComponentRelease content matches expected workload spec
            - [ ] Verify ReleaseBinding points to the correct release name
            - [ ] Merge to trigger Flux reconciliation
          labels: automated,componentrelease
