apiVersion: openchoreo.dev/v1alpha1
kind: ComponentRelease
metadata:
  name: thunderid-20260515-4
  namespace: thunderid
spec:
  componentProfile:
    parameters:
      image: ghcr.io/ayeshajay/thunderid:v0.38.0-hotfix-1
      runtime:
        console:
          clientBase: /console
          clientId: CONSOLE
          scopes: '["openid", "profile", "email", "system"]'
        dbStorageSize: 1Gi
        dbType: sqlite
        gate:
          clientBase: /gate
        imagePullPolicy: Always
  componentType:
    kind: ClusterComponentType
    name: deployment/thunderid
    spec:
      environmentConfigs:
        openAPIV3Schema:
          properties:
            consoleRedirectUris:
              default: '["http://localhost:8090/console"]'
              type: string
            endpointVisibility:
              default: external
              enum:
              - external
              - internal
              type: string
            gateClientHostname:
              default: ""
              type: string
            replicas:
              default: 1
              type: integer
            resourceLimitsCpu:
              default: 500m
              type: string
            resourceLimitsMemory:
              default: 512Mi
              type: string
            resourceRequestsCpu:
              default: 100m
              type: string
            resourceRequestsMemory:
              default: 128Mi
              type: string
            serverPublicUrl:
              default: ""
              type: string
          type: object
      parameters:
        openAPIV3Schema:
          properties:
            image:
              default: ghcr.io/asgardeo/thunder:latest
              type: string
            runtime:
              properties:
                console:
                  properties:
                    clientBase:
                      default: /console
                      type: string
                    clientId:
                      default: CONSOLE
                      type: string
                    scopes:
                      default: '["openid", "profile", "email"]'
                      type: string
                  type: object
                dbStorageSize:
                  default: 1Gi
                  type: string
                dbType:
                  default: sqlite
                  enum:
                  - sqlite
                  - postgres
                  type: string
                gate:
                  properties:
                    clientBase:
                      default: /gate
                      type: string
                  type: object
                imagePullPolicy:
                  default: Always
                  enum:
                  - Always
                  - IfNotPresent
                  - Never
                  type: string
              type: object
          type: object
      resources:
      - id: sqlite-pvc
        template:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${metadata.componentName}-sqlite
            namespace: ${metadata.namespace}
          spec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: ${parameters.runtime.dbStorageSize}
      - id: thunder-config
        includeWhen: ${parameters.runtime.dbType == 'sqlite'}
        template:
          apiVersion: v1
          data:
            deployment.yaml: |
              server:
                hostname: "0.0.0.0"
                public_url: "${environmentConfigs.serverPublicUrl}"
                port: ${workload.endpoints["api"].port}
                http_only: true

              gate_client:
                hostname: "${environmentConfigs.gateClientHostname}"
                port: {{.GATE_CLIENT_PORT}}
                scheme: "{{.GATE_CLIENT_SCHEME}}"

              crypto:
                encryption:
                  key: "{{.CRYPTO_ENCRYPTION_KEY}}"

              database:
                config:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_CONFIG_PATH}}"
                runtime:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_RUNTIME_PATH}}"
                user:
                  type: "sqlite"
                  sqlite:
                    path: "{{.DB_USER_PATH}}"

              cache:
                disabled: false
                type: "inmemory"
                size: {{.CACHE_SIZE}}
                ttl: {{.CACHE_TTL}}
                eviction_policy: "LRU"
                cleanup_interval: 600

              jwt:
                validity_period: {{.JWT_VALIDITY}}

              oauth:
                refresh_token:
                  renew_on_grant: true
                  validity_period: {{.OAUTH_REFRESH_TOKEN_VALIDITY}}

              flow:
                max_version_history: 3
                auto_infer_registration: true

              cors:
                allowed_origins: {{.CORS_ALLOWED_ORIGINS}}

              consent:
                enabled: {{.CONSENT_ENABLED}}
                base_url: "{{.CONSENT_BASE_URL}}"
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-config
            namespace: ${metadata.namespace}
      - id: thunder-config-pg
        includeWhen: ${parameters.runtime.dbType == 'postgres'}
        template:
          apiVersion: v1
          data:
            deployment.yaml: |
              server:
                hostname: "0.0.0.0"
                public_url: "${environmentConfigs.serverPublicUrl}"
                port: ${workload.endpoints["api"].port}
                http_only: true

              gate_client:
                hostname: "${environmentConfigs.gateClientHostname}"
                port: {{.GATE_CLIENT_PORT}}
                scheme: "{{.GATE_CLIENT_SCHEME}}"

              crypto:
                encryption:
                  key: "{{.CRYPTO_ENCRYPTION_KEY}}"

              database:
                config:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_CONFIG_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_CONFIG_NAME}}"
                    username: "{{.DB_CONFIG_USERNAME}}"
                    password: "{{.DB_CONFIG_PASSWORD}}"
                    sslmode: "{{.DB_CONFIG_SSLMODE}}"
                runtime:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_RUNTIME_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_RUNTIME_NAME}}"
                    username: "{{.DB_RUNTIME_USERNAME}}"
                    password: "{{.DB_RUNTIME_PASSWORD}}"
                    sslmode: "{{.DB_RUNTIME_SSLMODE}}"
                user:
                  type: "postgres"
                  postgres:
                    hostname: "{{.DB_USER_HOSTNAME}}"
                    port: {{.DB_PORT}}
                    name: "{{.DB_USER_NAME}}"
                    username: "{{.DB_USER_USERNAME}}"
                    password: "{{.DB_USER_PASSWORD}}"
                    sslmode: "{{.DB_USER_SSLMODE}}"

              cache:
                disabled: false
                type: "inmemory"
                size: {{.CACHE_SIZE}}
                ttl: {{.CACHE_TTL}}
                eviction_policy: "LRU"
                cleanup_interval: 600

              jwt:
                validity_period: {{.JWT_VALIDITY}}

              oauth:
                refresh_token:
                  renew_on_grant: true
                  validity_period: {{.OAUTH_REFRESH_TOKEN_VALIDITY}}

              flow:
                max_version_history: 3
                auto_infer_registration: true

              cors:
                allowed_origins: {{.CORS_ALLOWED_ORIGINS}}

              consent:
                enabled: {{.CONSENT_ENABLED}}
                base_url: "{{.CONSENT_BASE_URL}}"
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-config
            namespace: ${metadata.namespace}
      - id: gate-config
        template:
          apiVersion: v1
          data:
            config.js: |
              window.__THUNDERID_RUNTIME_CONFIG__ = {
                brand: {
                  product_name: 'ThunderID',
                  favicon: {
                    light: 'assets/images/favicon.ico',
                    dark: 'assets/images/favicon-inverted.ico',
                  },
                },
                client: {
                  base: "${parameters.runtime.gate.clientBase}",
                },
                server: {
                  public_url: "${environmentConfigs.serverPublicUrl}",
                },
              };
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-gate-config
            namespace: ${metadata.namespace}
      - id: console-config
        template:
          apiVersion: v1
          data:
            config.js: |
              window.__THUNDERID_RUNTIME_CONFIG__ = {
                brand: {
                  product_name: 'ThunderID',
                  favicon: {
                    light: 'assets/images/favicon.ico',
                    dark: 'assets/images/favicon-inverted.ico',
                  },
                },
                client: {
                  base: "${parameters.runtime.console.clientBase}",
                  client_id: "${parameters.runtime.console.clientId}",
                  scopes: ${parameters.runtime.console.scopes},
                },
                server: {
                  public_url: "${environmentConfigs.serverPublicUrl}",
                },
              };
          kind: ConfigMap
          metadata:
            name: ${metadata.componentName}-console-config
            namespace: ${metadata.namespace}
      - forEach: ${configurations.toConfigFileList()}
        id: file-config
        template:
          apiVersion: v1
          data:
            ${config.name}: |
              ${config.value}
          kind: ConfigMap
          metadata:
            name: ${config.resourceName}
            namespace: ${metadata.namespace}
        var: config
      - id: deployment
        template:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${metadata.componentName}
            namespace: ${metadata.namespace}
          spec:
            replicas: ${environmentConfigs.replicas}
            selector:
              matchLabels:
                app: ${metadata.componentName}
            template:
              metadata:
                labels:
                  app: ${metadata.componentName}
              spec:
                containers:
                - args:
                  - resources.yaml
                  command:
                  - ./start.sh
                  env: |
                    ${configurations.configs.envs.map(e, {"name": e.name, "value": e.value}) + [
                      {"name": "CONSOLE_REDIRECT_URIS_0", "value": environmentConfigs.consoleRedirectUris}
                    ]}
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: thunder
                  ports:
                  - containerPort: ${workload.endpoints["api"].port}
                  resources:
                    limits:
                      cpu: ${environmentConfigs.resourceLimitsCpu}
                      memory: ${environmentConfigs.resourceLimitsMemory}
                    requests:
                      cpu: ${environmentConfigs.resourceRequestsCpu}
                      memory: ${environmentConfigs.resourceRequestsMemory}
                  volumeMounts: |
                    ${[
                      {"name": "thunder-config", "mountPath": "/opt/thunderid/repository/conf/deployment.yaml", "subPath": "deployment.yaml"},
                      {"name": "gate-config", "mountPath": "/opt/thunderid/apps/gate/config.js", "subPath": "config.js"},
                      {"name": "console-config", "mountPath": "/opt/thunderid/apps/console/config.js", "subPath": "config.js"},
                      {"name": "sqlite-data", "mountPath": "/opt/thunderid/repository/database"}
                    ] + configurations.toContainerVolumeMounts().map(m, {"name": m.name, "mountPath": m.mountPath, "subPath": m.subPath})}
                initContainers:
                - args:
                  - |
                    if [ ! -f /data/.initialized ]; then
                      echo "Copying database directory from image..."
                      cp -r /opt/thunderid/repository/database/* /data/
                      touch /data/.initialized
                      echo "Database initialization complete"
                    else
                      echo "Database already initialized"
                    fi
                  command:
                  - sh
                  - -c
                  image: ${parameters.image}
                  imagePullPolicy: ${parameters.runtime.imagePullPolicy}
                  name: init-database
                  volumeMounts:
                  - mountPath: /data
                    name: sqlite-data
                volumes: |
                  ${[
                    {"name": "thunder-config", "configMap": {"name": metadata.componentName + "-config"}},
                    {"name": "gate-config", "configMap": {"name": metadata.componentName + "-gate-config"}},
                    {"name": "console-config", "configMap": {"name": metadata.componentName + "-console-config"}},
                    {"name": "sqlite-data", "persistentVolumeClaim": {"claimName": metadata.componentName + "-sqlite"}}
                  ] + configurations.toVolumes().map(v, {"name": v.name, "configMap": {"name": v.configMap.name}})}
      - id: service
        template:
          apiVersion: v1
          kind: Service
          metadata:
            name: ${metadata.componentName}
            namespace: ${metadata.namespace}
          spec:
            ports:
            - name: http
              port: ${workload.endpoints["api"].port}
              protocol: TCP
              targetPort: ${workload.endpoints["api"].port}
            selector:
              app: ${metadata.componentName}
            type: ClusterIP
      - forEach: ${workload.endpoints.transformMap(name, ep, ep.type in ["HTTP", "GraphQL",
          "Websocket"], ep)}
        id: httproute-external
        includeWhen: ${environmentConfigs.endpointVisibility == 'external'}
        template:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name":
              endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
            name: ${oc_generate_name(metadata.componentName, endpoint.key)}
            namespace: ${metadata.namespace}
          spec:
            hostnames: |
              ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
                .filter(g, g.hasValue()).map(g, g.value().host).distinct()
                .map(h, metadata.environmentName + "-" + metadata.componentName + "-" + metadata.componentNamespace + "." + h)}
            parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
            rules:
            - backendRefs:
              - name: ${metadata.componentName}
                port: ${endpoint.value.port}
              filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    replacePrefixMatch: ${endpoint.value.?basePath.orValue("/")}
                    type: ReplacePrefixMatch
              matches:
              - path:
                  type: PathPrefix
                  value: /
        var: endpoint
      workloadType: deployment
  owner:
    componentName: thunderid
    projectName: identity-platform
  workload:
    container:
      env:
      - key: SERVER_PORT
        value: "8090"
      - key: JWT_VALIDITY
        value: "3600"
      - key: OAUTH_REFRESH_TOKEN_VALIDITY
        value: "86400"
      - key: CACHE_SIZE
        value: "10000"
      - key: CACHE_TTL
        value: "3600"
      - key: CONSENT_ENABLED
        value: "false"
      - key: CONSENT_BASE_URL
        value: http://localhost:9090/api/v1
      - key: GATE_CLIENT_BASE
        value: /gate
      - key: CONSOLE_CLIENT_BASE
        value: /console
      - key: CONSOLE_CLIENT_ID
        value: CONSOLE
      - key: CONSOLE_SCOPES
        value: '["openid", "profile", "email", "system"]'
      - key: CORS_ALLOWED_ORIGINS
        value: '["http://development-thunderid-thunderid.openchoreoapis.demo:19080",
          "https://localhost:3000"]'
      - key: GATE_CLIENT_PORT
        value: "19080"
      - key: GATE_CLIENT_SCHEME
        value: http
      - key: DB_CONFIG_PATH
        value: repository/database/configdb.db
      - key: DB_RUNTIME_PATH
        value: repository/database/runtimedb.db
      - key: DB_USER_PATH
        value: repository/database/userdb.db
      - key: CRYPTO_ENCRYPTION_KEY
        value: file://repository/resources/security/crypto.key
      - key: REACT_SDK_SAMPLE_CLIENT_ID
        value: REACT_SDK_SAMPLE
      - key: REACT_SDK_SAMPLE_REDIRECT_URIS_0
        value: https://localhost:3000
      - key: SAMPLE_APP_CLIENT_ID
        value: sample_app_client
      - key: SAMPLE_APP_REDIRECT_URIS_0
        value: https://localhost:3000
      files:
      - key: resources.yaml
        mountPath: /opt/thunderid/
        value: "# File: Console.yaml\n# resource_type: application\nid: 019e21b1-c2b1-7a37-8e58-4f18a8906bdb\nou_id:
          019e21b1-bed0-7c99-aa52-4bad505b6d89\nname: Console\ndescription: Management
          application for ThunderID\nurl: https://localhost:8090/console\nlogo_url:
          emoji:\U0001F468‍\U0001F4BB\nauth_flow_id: 019e21b1-c238-7a66-8e82-5d004c0694c0\nregistration_flow_id:
          019e21b1-c28f-7d72-a3e8-4822db87ca69\nis_registration_flow_enabled: false\nis_recovery_flow_enabled:
          false\nassertion:\n  validity_period: 3600\nlogin_consent:\n  validity_period:
          0\nallowed_user_types:\n  - Person\ninbound_auth_config:\n  - type: oauth2\n
          \   config:\n      client_id: {{.CONSOLE_CLIENT_ID}}\n      redirect_uris:\n
          \       {{- range .CONSOLE_REDIRECT_URIS}}\n        - {{.}}\n        {{-
          end}}\n      grant_types:\n        - authorization_code\n        - refresh_token\n
          \     response_types:\n        - code\n      token_endpoint_auth_method:
          none\n      pkce_required: true\n      public_client: true\n      require_pushed_authorization_requests:
          false\n      token:\n        access_token:\n          validity_period: 3600\n
          \         user_attributes:\n            - given_name\n            - family_name\n
          \           - email\n            - groups\n            - name\n            -
          ouId\n        id_token:\n          validity_period: 3600\n          user_attributes:\n
          \           - given_name\n            - family_name\n            - email\n
          \           - groups\n            - name\n            - ouId\n          response_type:
          JWT\n      user_info:\n        response_type: JSON\n        user_attributes:\n
          \         - given_name\n          - family_name\n          - email\n          -
          groups\n          - name\n          - ouId\n      scope_claims:\n        ou:\n
          \         - ouId\n        phone:\n          - phone_number\n          -
          phone_number_verified\n        profile:\n          - name\n          - given_name\n
          \         - family_name\n          - picture\n        email:\n          -
          email\n          - email_verified\n        group:\n          - groups\n\n---\n#
          File: Sample_App.yaml\n# resource_type: application\nid: 019e21b1-c42d-7f05-8ba3-887e194dcc15\nou_id:
          019e21b1-c402-7287-abda-46a759f37f25\nname: Sample App\ndescription: Sample
          application for testing purposes\nurl: https://localhost:3000\nlogo_url:
          emoji:\U0001F381\ntos_uri: https://localhost:3000/terms\npolicy_uri: https://localhost:3000/privacy\ncontacts:\n
          \ - admin@example.com\n  - support@example.com\nauth_flow_id: 019e21b1-c080-7d77-8ab0-a1bc3d55c983\nis_registration_flow_enabled:
          true\nis_recovery_flow_enabled: false\nassertion:\n  validity_period: 3600\nlogin_consent:\n
          \ validity_period: 0\nallowed_user_types:\n  - Customer\ninbound_auth_config:\n
          \ - type: oauth2\n    config:\n      client_id: {{.SAMPLE_APP_CLIENT_ID}}\n
          \     redirect_uris:\n        {{- range .SAMPLE_APP_REDIRECT_URIS}}\n        -
          {{.}}\n        {{- end}}\n      grant_types:\n        - authorization_code\n
          \     response_types:\n        - code\n      token_endpoint_auth_method:
          none\n      pkce_required: true\n      public_client: true\n      require_pushed_authorization_requests:
          false\n      token:\n        access_token:\n          validity_period: 3600\n
          \         user_attributes:\n            - given_name\n            - family_name\n
          \           - email\n            - groups\n        id_token:\n          validity_period:
          3600\n          user_attributes:\n            - given_name\n            -
          family_name\n            - email\n            - groups\n          response_type:
          JWT\n      scopes:\n        - openid\n        - profile\n        - email\n
          \     user_info:\n        response_type: JSON\n        user_attributes:\n
          \         - given_name\n          - family_name\n          - email\n          -
          groups\n      scope_claims:\n        email:\n          - email\n          -
          email_verified\n        group:\n          - groups\n        phone:\n          -
          phone_number\n          - phone_number_verified\n        profile:\n          -
          name\n          - given_name\n          - family_name\n          - picture\n\n---\n#
          File: React_SDK_Sample.yaml\n# resource_type: application\nid: 019e21b1-c449-7f54-be1d-508e5a04cce1\nou_id:
          019e21b1-c402-7287-abda-46a759f37f25\nname: React SDK Sample\ndescription:
          Sample React application using ThunderID React SDK\nurl: https://localhost:3000\nlogo_url:
          emoji:\U0001F6CD️\ntos_uri: https://localhost:3000/terms\npolicy_uri: https://localhost:3000/privacy\ncontacts:\n
          \ - admin@example.com\nauth_flow_id: 019e21b1-c080-7d77-8ab0-a1bc3d55c983\nis_registration_flow_enabled:
          true\nis_recovery_flow_enabled: false\nassertion:\n  validity_period: 3600\nlogin_consent:\n
          \ validity_period: 0\nallowed_user_types:\n  - Customer\ninbound_auth_config:\n
          \ - type: oauth2\n    config:\n      client_id: {{.REACT_SDK_SAMPLE_CLIENT_ID}}\n
          \     redirect_uris:\n        {{- range .REACT_SDK_SAMPLE_REDIRECT_URIS}}\n
          \       - {{.}}\n        {{- end}}\n      grant_types:\n        - authorization_code\n
          \     response_types:\n        - code\n      token_endpoint_auth_method:
          none\n      pkce_required: true\n      public_client: true\n      require_pushed_authorization_requests:
          false\n      token:\n        access_token:\n          validity_period: 3600\n
          \         user_attributes:\n            - given_name\n            - family_name\n
          \           - email\n            - groups\n            - name\n        id_token:\n
          \         validity_period: 3600\n          user_attributes:\n            -
          given_name\n            - family_name\n            - email\n            -
          groups\n            - name\n          response_type: JWT\n      user_info:\n
          \       response_type: JSON\n        user_attributes:\n          - given_name\n
          \         - family_name\n          - email\n          - groups\n          -
          name\n      scope_claims:\n        group:\n          - groups\n        phone:\n
          \         - phone_number\n          - phone_number_verified\n        profile:\n
          \         - name\n          - given_name\n          - family_name\n          -
          picture\n        email:\n          - email\n          - email_verified\n\n---\n#
          File: Console_App_Authentication_Flow.yaml\n# resource_type: flow\nid: 019e21b1-c238-7a66-8e82-5d004c0694c0\nhandle:
          console-app-flow\nname: Console App Authentication Flow\nflowType: AUTHENTICATION\nactiveVersion:
          1\nnodes:\n  - id: start\n    type: START\n    onSuccess: prompt_credentials\n
          \ - id: prompt_credentials\n    type: PROMPT\n    meta: '{\"components\":[{\"id\":\"text_001\",\"label\":\"{{
          t(signin:forms.credentials.title) }}\",\"type\":\"TEXT\",\"variant\":\"HEADING_1\"},{\"components\":[{\"id\":\"input_001\",\"label\":\"{{
          t(signin:forms.credentials.fields.username.label) }}\",\"placeholder\":\"{{
          t(signin:forms.credentials.fields.username.placeholder) }}\",\"ref\":\"username\",\"required\":true,\"type\":\"TEXT_INPUT\"},{\"id\":\"input_002\",\"label\":\"{{
          t(signin:forms.credentials.fields.password.label) }}\",\"placeholder\":\"{{
          t(signin:forms.credentials.fields.password.placeholder) }}\",\"ref\":\"password\",\"required\":true,\"type\":\"PASSWORD_INPUT\"},{\"category\":\"DISPLAY\",\"id\":\"rich_text_forgot_password\",\"label\":\"\\u003cp
          class=\\\"rich-text-paragraph\\\"\\u003e\\u003cspan class=\\\"rich-text-pre-wrap\\\"\\u003e{{
          t(signin:forms.credentials.links.forgot_password.prefix) }} \\u003c/span\\u003e\\u003ca
          href=\\\"{{meta(application.forgot_password_url)}}\\\" target=\\\"_blank\\\"
          rel=\\\"noopener noreferrer\\\" class=\\\"rich-text-link\\\"\\u003e\\u003cspan
          class=\\\"rich-text-pre-wrap\\\"\\u003e{{ t(signin:forms.credentials.links.forgot_password.label)
          }}\\u003c/span\\u003e\\u003c/a\\u003e\\u003c/p\\u003e\",\"resourceType\":\"ELEMENT\",\"type\":\"RICH_TEXT\"},{\"eventType\":\"SUBMIT\",\"id\":\"action_001\",\"label\":\"{{
          t(signin:forms.credentials.actions.submit.label) }}\",\"type\":\"ACTION\",\"variant\":\"PRIMARY\"},{\"category\":\"DISPLAY\",\"id\":\"rich_text_signup\",\"label\":\"\\u003cp
          class=\\\"rich-text-paragraph\\\"\\u003e\\u003cspan class=\\\"rich-text-pre-wrap\\\"\\u003e{{
          t(signin:forms.credentials.links.sign_up.prefix) }} \\u003c/span\\u003e\\u003ca
          href=\\\"{{meta(application.sign_up_url)}}\\\" target=\\\"_blank\\\" rel=\\\"noopener
          noreferrer\\\" class=\\\"rich-text-link\\\"\\u003e\\u003cspan class=\\\"rich-text-pre-wrap\\\"\\u003e{{
          t(signin:forms.credentials.links.sign_up.label) }}\\u003c/span\\u003e\\u003c/a\\u003e\\u003c/p\\u003e\",\"resourceType\":\"ELEMENT\",\"type\":\"RICH_TEXT\"}],\"id\":\"block_001\",\"type\":\"BLOCK\"}]}'\n
          \   prompts:\n      - inputs:\n          - ref: input_001\n            type:
          TEXT_INPUT\n            identifier: username\n            required: true\n
