apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: thunder
  namespace: thunder-idp
spec:
  owner:
    componentName: thunder
    projectName: identity-platform
  container:
    image: ghcr.io/asgardeo/thunder:latest
    env:
      - key: SERVER_PORT
        value: "8090"
      - key: JWT_VALIDITY
        value: "3600"
      - key: OAUTH_REFRESH_TOKEN_VALIDITY
        value: "86400"
      - key: CACHE_SIZE
        value: "10000"
      - key: CACHE_TTL
        value: "3600"
      - key: CONSENT_ENABLED
        value: "false"
      - key: CONSENT_BASE_URL
        value: "http://localhost:9090/api/v1"
      - key: GATE_CLIENT_BASE
        value: "/gate"
      - key: CONSOLE_CLIENT_BASE
        value: "/console"
      - key: CONSOLE_CLIENT_ID
        value: "CONSOLE"
      - key: CONSOLE_SCOPES
        value: '["openid", "profile", "email", "system"]'
      - key: CORS_ALLOWED_ORIGINS
        value: '["http://development-thunder-thunder.openchoreoapis.localhost:19080", "https://localhost:3000"]'
      - key: GATE_CLIENT_PORT
        value: "19080"
      - key: GATE_CLIENT_SCHEME
        value: "http"
      - key: DB_CONFIG_PATH
        value: "repository/database/configdb.db"
      - key: DB_RUNTIME_PATH
        value: "repository/database/runtimedb.db"
      - key: DB_USER_PATH
        value: "repository/database/userdb.db"
      - key: CRYPTO_ENCRYPTION_KEY
        value: "file://repository/resources/security/crypto.key"
    files:
      - key: wso2_cloud_theme_v2.yaml
        mountPath: /opt/thunder/repository/resources/themes
        value: |
          id: "d1e2f3a4-b5c6-7890-abcd-theme0000002"
          displayName: "WSO2 Cloud Theme V6"
          description: "Default theme for WSO2 Cloud login pages"
          theme:
            direction: "ltr"
            defaultColorScheme: "light"
            colorSchemes:
              light:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#1a1a2e"
                    dark: "#0d0d1a"
                    contrastText: "#ffffff"
                  background:
                    default: "#f7f8fb"
                    paper: "#ffffff"
                  text:
                    primary: "#000000"
                    secondary: "#494848"
              dark:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#ff9966"
                    dark: "#fa7b3f"
                    contrastText: "#000000"
                  background:
                    default: "#121212"
                    paper: "#1e1e1e"
                  text:
                    primary: "#ffffff"
                    secondary: "#cccccc"
            shape:
              borderRadius: 8
            typography:
              fontFamily: "'Inter Variable', sans-serif"
              h1:
                fontSize: "1.75rem"
                fontWeight: 600
                lineHeight: 1.3
      - key: wso2_cloud_theme.yaml
        mountPath: /opt/thunder/repository/resources/themes
        value: |
          id: "d1e2f3a4-b5c6-7890-abcd-theme0000001"
          displayName: "WSO2 Cloud Theme"
          description: "Default theme for WSO2 Cloud login pages"
          theme:
            direction: "ltr"
            defaultColorScheme: "light"
            colorSchemes:
              light:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#1a1a2e"
                    dark: "#0d0d1a"
                    contrastText: "#ffffff"
                  background:
                    default: "#f7f8fb"
                    paper: "#ffffff"
                  text:
                    primary: "#000000"
                    secondary: "#494848"
              dark:
                colors:
                  primary:
                    main: "#fa7b3f"
                    dark: "#e74420"
                    contrastText: "#ffffff"
                  secondary:
                    main: "#ff9966"
                    dark: "#fa7b3f"
                    contrastText: "#000000"
                  background:
                    default: "#121212"
                    paper: "#1e1e1e"
                  text:
                    primary: "#ffffff"
                    secondary: "#cccccc"
            shape:
              borderRadius: 8
            typography:
              fontFamily: "'Inter Variable', sans-serif"
              h1:
                fontSize: "1.75rem"
                fontWeight: 600
                lineHeight: 1.3
      - key: sample-flow.yaml
        mountPath: /opt/thunder/repository/resources/flows
        value: |
          id: "f6a7b8c9-d0e1-2345-fabc-678901234567"
          handle: auth_flow_config_wso2_cloud_disambiguation
          name: WSO2 Cloud Authentication Flow with Disambiguation
          flowType: AUTHENTICATION
          nodes:
            - id: start
              type: START
              onSuccess: choose_auth

            # --- Choose social provider ---
            - id: choose_auth
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_001
                    label: "Sign in to WSO2 Cloud"
                    variant: HEADING_1
                  - type: BLOCK
                    id: block_001
                    components:
                      - eventType: TRIGGER
                        id: action_google
                        label: "Continue with Google"
                        type: ACTION
                        variant: SOCIAL
                      - eventType: TRIGGER
                        id: action_github
                        label: "Continue with GitHub"
                        type: ACTION
                        variant: SOCIAL
              prompts:
                - action:
                    ref: action_google
                    nextNode: google_auth
                - action:
                    ref: action_github
                    nextNode: github_auth

            # --- Google ---
            - id: google_auth
              type: TASK_EXECUTION
              properties:
                idpId: "456efc02-bad3-47bb-bd87-01cc94f8388c"
                allowAuthenticationWithoutLocalUser: true
                allowCrossOUProvisioning: true
              executor:
                name: GoogleOIDCAuthExecutor
              onSuccess: check_user_state

            # --- GitHub ---
            - id: github_auth
              type: TASK_EXECUTION
              properties:
                idpId: "372a20db-a946-4b40-add0-0049d15a5f9c"
                allowAuthenticationWithoutLocalUser: true
                allowCrossOUProvisioning: true
              executor:
                name: GithubOAuthExecutor
              onSuccess: check_user_state

            # --- Check if user is ambiguous (exists in multiple OUs) ---
            # Runs only when userAmbiguous=true (set by OAuthExecutor).
            # When not ambiguous, skips to org_registration_prompt.
            - id: check_user_state
              type: TASK_EXECUTION
              executor:
                name: IdentifyingExecutor
                mode: resolve
                inputs:
                  - identifier: sub
                    type: TEXT_INPUT
                    required: true
              onSuccess: org_registration_prompt
              onIncomplete: prompt_disambiguate
              condition:
                key: "{{ context.userAmbiguous }}"
                value: true
                onSkip: org_registration_prompt

            # --- Disambiguation: user exists in multiple OUs ---
            - id: prompt_disambiguate
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_disambig_title
                    label: "Select your organization"
                    variant: HEADING_1
                  - align: center
                    type: TEXT
                    id: text_disambig_subtitle
                    label: "Your account exists in multiple organizations. Please select one to continue."
                    variant: BODY_2
                  - type: BLOCK
                    id: block_disambig
                    components:
                      - id: select_ou
                        ref: ouHandle
                        type: SELECT
                        label: "Organization"
                        required: true
                        placeholder: "Select your organization"
                        options: []
                      - type: ACTION
                        id: action_select_ou
                        label: "Continue"
                        variant: PRIMARY
                        eventType: SUBMIT
              prompts:
                - inputs:
                    - ref: select_ou
                      identifier: ouHandle
                      type: SELECT
                      required: true
                  action:
                    ref: action_select_ou
                    nextNode: resolve_federated_user

            # --- Resolve disambiguated user (sets AuthenticatedUser) ---
            - id: resolve_federated_user
              type: TASK_EXECUTION
              executor:
                name: FederatedAuthResolverExecutor
                inputs:
                  - identifier: ouHandle
                    type: TEXT_INPUT
                    required: true
              onSuccess: auth_assert
              onIncomplete: prompt_disambiguate

            # --- OU provisioning (new social users) ---
            - id: org_registration_prompt
              type: PROMPT
              meta:
                components:
                  - align: center
                    type: TEXT
                    id: text_org_title
                    label: "Create Your Organization"
                    variant: HEADING_1
                  - align: center
                    type: TEXT
                    id: text_org_subtitle
                    label: "Set up your organization to get started"
                    variant: BODY
                  - type: BLOCK
                    id: block_org
                    components:
                      - id: input_ou_name
                        ref: ouName
                        type: TEXT_INPUT
                        label: "Organization Name"
                        required: true
                        placeholder: "Enter your organization name"
                      - id: input_ou_handle
                        ref: ouHandle
                        type: TEXT_INPUT
                        label: "Organization Handle"
                        required: true
                        placeholder: "Enter a unique handle (e.g., my-org)"
                      - eventType: SUBMIT
                        id: action_create_org
                        label: "Create Organization"
                        type: ACTION
                        variant: PRIMARY
              prompts:
                - inputs:
                    - ref: input_ou_name
                      type: TEXT_INPUT
                      identifier: ouName
                      required: true
                    - ref: input_ou_handle
                      type: TEXT_INPUT
                      identifier: ouHandle
                      required: true
                  action:
                    ref: action_create_org
                    nextNode: ou_creation
              condition:
                key: "{{ context.userEligibleForProvisioning }}"
                value: true
                onSkip: auth_assert

            - id: ou_creation
              type: TASK_EXECUTION
              executor:
                name: OUExecutor
              onSuccess: provisioning

            - id: provisioning
              type: TASK_EXECUTION
              executor:
                name: ProvisioningExecutor
              onSuccess: auth_assert

            # --- Final ---
            - id: auth_assert
              type: TASK_EXECUTION
              executor:
                name: AuthAssertExecutor
              onSuccess: end

            - id: end
              type: END
  endpoints:
    api:
      type: HTTP
      port: 8090
      displayName: "Thunder API"
      visibility:
        - external
